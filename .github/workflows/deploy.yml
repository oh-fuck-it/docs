name: Deploy Mintlify Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: mintlify-prod-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT }}
          script_stop: true
          script: |
            set -euo pipefail

            DOCS_DIR="/opt/mintlify/docs"
            STACK_DIR="/opt/mintlify/stack"

            cd "$DOCS_DIR"
            git fetch --all --prune
            git reset --hard origin/main

            cd "$STACK_DIR"
            docker compose up -d --force-recreate --no-deps mintlify
